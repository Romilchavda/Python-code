<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Pro IDE</title>
    
    <!-- External CSS -->
    <link rel="stylesheet" href="assets/style.css">
    
    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Monaco & Pyodide -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="brand">
            <button class="menu-btn" onclick="toggleMenu()">☰</button>
            <span class="brand-title">Ultimate IDE</span>
        </div>
        <button id="runBtn" class="btn-run" onclick="runCode()" disabled>⏳ Loading...</button>
    </header>

    <!-- Sidebar & Overlay -->
    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>
    <div class="sidebar" id="sidebar">
        <div class="section-header">
            <span>Explorer</span>
            <div class="actions">
                <button class="icon-btn" onclick="addNewFile()" title="New File">📄+</button>
                <button class="icon-btn" onclick="addNewFolder()" title="New Folder">📁+</button>
            </div>
        </div>
        <div class="file-tree" id="fileTree"></div> <!-- Files/Folders will load here -->
    </div>

    <!-- Main Workspace -->
    <div class="main-workspace">
        <div class="tabs-container" id="fileTabs"></div>
        <div id="editor-container"></div>
    </div>

    <!-- Terminal / Output -->
    <div class="terminal-container">
        <div class="terminal-header">
            <span class="term-title" id="output-title">TERMINAL</span>
            <button class="btn-clear" onclick="clearOutput()">CLEAR</button>
        </div>
        <div id="terminal-output"></div>
        <iframe id="web-preview" class="hidden"></iframe> <!-- For HTML/CSS/JS preview -->
    </div>

    <!-- External JS -->
    <script src="assets/app.js"></script>
</body>
</html>
